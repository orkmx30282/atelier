<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>アトリエ給与計算</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f8;
    --surface: #ffffff;
    --surface2: #eef0f7;
    --border: #d0d4e8;
    --accent: #5b4ee0;
    --accent2: #4a3dbf;
    --green: #16a34a;
    --red: #dc2626;
    --yellow: #d97706;
    --text: #1a1a2e;
    --muted: #6b7280;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px 0;
  }

  header {
    background: linear-gradient(135deg, #5b4ee0 0%, #4a3dbf 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #ffffff;
  }
  header p {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
  }

  .container { padding: 16px; max-width: 480px; margin: 0 auto; }

  /* Month selector */
  .month-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 16px;
  }
  .month-bar span {
    font-size: 15px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    color: var(--accent2);
    letter-spacing: 0.05em;
  }
  .month-bar button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .month-bar button:hover { background: var(--accent); }

  /* Settings panel */
  .settings-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .setting-item label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: block;
    margin-bottom: 4px;
  }
  .setting-item input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Mono', monospace;
    padding: 7px 10px;
    border-radius: 8px;
    width: 100%;
  }
  .setting-item input:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* Day entry cards */
  .days-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-left: 2px;
  }

  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .day-card.has-data { border-color: #a5b4fc; }
  .day-card.is-holiday { border-left: 3px solid var(--yellow); }
  .day-card.is-transfer { border-left: 3px solid var(--green); background: #f0fdf4; }

  .day-header {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    cursor: pointer;
    gap: 10px;
    user-select: none;
  }
  .day-num {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--muted);
    min-width: 28px;
  }
  .day-card.has-data .day-num { color: var(--text); }
  .day-wd {
    font-size: 12px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--muted);
    min-width: 30px;
    text-align: center;
  }
  .day-wd.sat { color: #60a5fa; }
  .day-wd.sun { color: var(--red); }
  .day-wd.hol { color: var(--yellow); }
  .holiday-badge {
    font-size: 9px;
    background: var(--yellow);
    color: #000;
    padding: 2px 6px;
    border-radius: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .transfer-badge {
    font-size: 9px;
    background: var(--green);
    color: #000;
    padding: 2px 6px;
    border-radius: 10px;
    font-weight: 700;
  }
  .day-summary {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent2);
    font-weight: 500;
  }
  .expand-icon {
    font-size: 10px;
    color: var(--muted);
    transition: transform 0.2s;
  }
  .day-card.open .expand-icon { transform: rotate(180deg); }

  .day-body {
    display: none;
    padding: 0 14px 14px;
    gap: 10px;
    flex-direction: column;
  }
  .day-card.open .day-body { display: flex; }

  .time-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .time-row label {
    font-size: 10px;
    color: var(--muted);
    display: block;
    margin-bottom: 4px;
    letter-spacing: 0.05em;
  }
  .time-display {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 20px;
    font-family: 'DM Mono', monospace;
    padding: 10px;
    border-radius: 8px;
    width: 100%;
    text-align: center;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: border-color 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .time-display:active { border-color: var(--accent); background: #2a2a38; }
  .time-display.empty { color: var(--muted); font-size: 14px; }

  /* Modal picker */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    width: 100%;
    max-width: 480px;
    padding: 20px 20px 40px;
  }
  .modal-title {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 16px;
    letter-spacing: 0.05em;
  }
  .modal-time-display {
    font-family: 'DM Mono', monospace;
    font-size: 48px;
    font-weight: 500;
    color: var(--accent2);
    text-align: center;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
    padding: 10px;
    background: var(--surface2);
    border-radius: 12px;
  }
  .modal-time-display .cursor {
    display: inline-block;
    width: 3px;
    height: 44px;
    background: var(--accent);
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .drum-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .drum-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .drum-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .drum-arrow {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent2);
    font-size: 20px;
    width: 64px; height: 52px;
    border-radius: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
    user-select: none;
    touch-action: manipulation;
  }
  .drum-arrow:active { background: var(--accent); color: #fff; }
  .drum-val {
    font-family: 'DM Mono', monospace;
    font-size: 36px;
    font-weight: 500;
    color: var(--text);
    min-width: 64px;
    text-align: center;
    padding: 8px 0;
    background: var(--surface2);
    border-radius: 10px;
  }
  .drum-sep {
    font-size: 36px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    padding-top: 28px;
  }
  .drum-hint {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .modal-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .modal-cancel {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 15px;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .modal-ok {
    background: var(--accent);
    border: none;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .transport-row {
    display: flex;
    gap: 8px;
  }
  .transport-row label {
    font-size: 11px;
    color: var(--muted);
    display: block;
    margin-bottom: 0;
  }
  .transport-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .transport-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 700;
  }
  .clear-btn {
    background: none;
    border: 1px solid #fca5a5;
    color: var(--red);
    font-size: 11px;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    align-self: flex-end;
  }

  /* Result panel */
  .result-panel {
    background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 20px;
    margin-top: 20px;
    position: relative;
    overflow: hidden;
  }
  .result-panel::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(91,78,224,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .result-title {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .result-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
  }
  .result-row .label { color: var(--muted); }
  .result-row .val {
    font-family: 'DM Mono', monospace;
    color: var(--text);
    font-size: 13px;
  }
  .result-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 10px 0;
  }
  .result-total {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .result-total .label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }
  .result-total .amount {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    color: var(--accent2);
  }

  /* Transfer section */
  .transfer-info {
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 12px;
  }
  .transfer-info-title {
    font-size: 10px;
    color: var(--green);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 700;
  }
  .transfer-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 3px 0;
  }
  .transfer-row .td { color: var(--green); font-family: 'DM Mono', monospace; }
  .transfer-row .tt { color: var(--muted); font-family: 'DM Mono', monospace; }

  .copy-btn {
    width: 100%;
    margin-top: 16px;
    background: #fff;
    border: 2px solid var(--accent);
    color: var(--accent);
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 13px;
    border-radius: var(--radius);
    cursor: pointer;
    letter-spacing: 0.03em;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, color 0.15s;
  }
  .copy-btn:active { background: var(--accent); color: #fff; }
  .calc-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 16px;
    margin-top: 20px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .calc-btn:active { transform: scale(0.98); opacity: 0.9; }

  .no-result {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 20px;
  }

  /* Overflow chip */
  .overflow-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    background: rgba(248,113,113,0.15);
    color: var(--red);
    border-radius: 20px;
    padding: 2px 8px;
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <h1>🧮 アトリエ給与計算</h1>
  <p>時給 ¥1,200 ｜ 上限 5h50m ｜ 超過分自動振替</p>
</header>

<div class="container">

  <!-- Month selector -->
  <div class="month-bar">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="monthLabel"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>

  <!-- Settings -->
  <div class="settings-panel">
    <div class="setting-item">
      <label>時給（円）</label>
      <input type="number" id="hourly" value="1200">
    </div>
    <div class="setting-item">
      <label>上限（hh.mm）</label>
      <input type="text" id="limitInput" value="5.50" placeholder="5.50">
    </div>
    <div class="setting-item">
      <label>車 交通費（円）</label>
      <input type="number" id="carFare" value="200">
    </div>
    <div class="setting-item">
      <label>徒歩 交通費（円）</label>
      <input type="number" id="walkFare" value="100">
    </div>
  </div>

  <!-- Day cards -->
  <div class="days-label">出勤日を入力</div>
  <div id="dayList"></div>

  <button class="calc-btn" onclick="calculate()">給与を計算する</button>

  <div id="resultArea"></div>

</div>

<!-- Time picker modal -->
<div class="modal-overlay" id="timePicker">
  <div class="modal-box">
    <div class="modal-title" id="pickerTitle">開始時間を入力</div>
    <div class="modal-time-display" id="pickerDisplay">09:00</div>
    <div class="drum-wrap">
      <div class="drum-col">
        <div class="drum-label">時</div>
        <button class="drum-arrow" onclick="adjustTime('h',1)">▲</button>
        <div class="drum-val" id="drumH">9</div>
        <button class="drum-arrow" onclick="adjustTime('h',-1)">▼</button>
      </div>
      <div class="drum-sep">:</div>
      <div class="drum-col">
        <div class="drum-label">分</div>
        <button class="drum-arrow" onclick="adjustTime('m',5)">▲</button>
        <div class="drum-val" id="drumM">00</div>
        <button class="drum-arrow" onclick="adjustTime('m',-5)">▼</button>
      </div>
    </div>
    <div class="drum-hint">▲▼ で調整（分は5分単位）。長押しで連続変更</div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closePicker()">キャンセル</button>
      <button class="modal-ok" onclick="confirmPicker()">決定</button>
    </div>
  </div>
</div>

<script>
// State
let currentYear = 2026;
let currentMonth = 3;

// Japanese holidays (simple list for 2026)
const holidays2026 = {
  '2026-01-01': '元日', '2026-01-12': '成人の日',
  '2026-02-11': '建国記念の日', '2026-02-23': '天皇誕生日',
  '2026-03-20': '春分の日',
  '2026-04-29': '昭和の日',
  '2026-05-03': '憲法記念日', '2026-05-04': 'みどりの日', '2026-05-05': 'こどもの日',
  '2026-07-20': '海の日',
  '2026-08-11': '山の日',
  '2026-09-21': '敬老の日', '2026-09-23': '秋分の日',
  '2026-10-12': 'スポーツの日',
  '2026-11-03': '文化の日', '2026-11-23': '勤労感謝の日',
};

const WD = ['日','月','火','水','木','金','土'];

function dateKey(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function daysInMonth(y, m) {
  return new Date(y, m, 0).getDate();
}

function getWeekday(y, m, d) {
  return new Date(y, m-1, d).getDay(); // 0=Sun
}

function isHoliday(y, m, d) {
  return !!holidays2026[dateKey(y, m, d)];
}

function isWeekend(wd) { return wd === 0 || wd === 6; }

function parseHHMM(str) {
  // "hh.mm" → minutes. e.g. "5.50" → 350
  const s = String(str).trim();
  const parts = s.split('.');
  const h = parseInt(parts[0]) || 0;
  const m = parseInt((parts[1] || '0').padEnd(2,'0')) || 0;
  return h * 60 + m;
}

function minutesToHHMM(mins) {
  return `${Math.floor(mins/60)}.${String(mins%60).padStart(2,'0')}`;
}

function minutesToDecimal(mins) {
  return mins / 60;
}

function timeDiff(start, end) {
  // "HH:MM" strings
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  return (eh*60+em) - (sh*60+sm);
}

// Per-day data: { start, end, transport }
let dayData = {};

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  render();
}

function render() {
  document.getElementById('monthLabel').textContent = `${currentYear}年 ${currentMonth}月`;

  const days = daysInMonth(currentYear, currentMonth);
  let html = '';

  for (let d = 1; d <= days; d++) {
    const wd = getWeekday(currentYear, currentMonth, d);
    const hol = isHoliday(currentYear, currentMonth, d);
    const key = dateKey(currentYear, currentMonth, d);
    const data = dayData[key] || {};
    const hasData = !!(data.start && data.end);

    let wdClass = '';
    if (wd === 0) wdClass = 'sun';
    else if (wd === 6) wdClass = 'sat';
    else if (hol) wdClass = 'hol';

    let cardClass = 'day-card';
    if (hasData) cardClass += ' has-data';
    if (hol) cardClass += ' is-holiday';

    let worked = '';
    let overflowChip = '';
    if (hasData) {
      const mins = timeDiff(data.start, data.end);
      worked = minutesToHHMM(mins);
      const limit = parseHHMM(document.getElementById('limitInput').value || '5.50');
      if (mins > limit) {
        const over = mins - limit;
        overflowChip = `<span class="overflow-chip">超過 ${minutesToHHMM(over)}</span>`;
      }
    }

    const holBadge = hol ? `<span class="holiday-badge">祝</span>` : '';
    const isOpen = hasData ? ' open' : '';

    html += `
    <div class="${cardClass}${isOpen}" id="card-${key}">
      <div class="day-header" onclick="toggleCard('${key}')">
        <span class="day-num">${d}</span>
        <span class="day-wd ${wdClass}">${WD[wd]}</span>
        ${holBadge}
        ${hasData ? `<span class="day-summary">${worked}</span>` : ''}
        ${overflowChip}
        <span class="expand-icon">▼</span>
      </div>
      <div class="day-body">
        <div class="time-row">
          <div>
            <label>開始時間</label>
            <div class="time-display ${data.start?'':'empty'}" onclick="openPicker('${key}','start')">${data.start || 'タップして入力'}</div>
          </div>
          <div>
            <label>終了時間</label>
            <div class="time-display ${data.end?'':'empty'}" onclick="openPicker('${key}','end')">${data.end || 'タップして入力'}</div>
          </div>
        </div>
        <div>
          <label style="font-size:10px;color:var(--muted);display:block;margin-bottom:6px;letter-spacing:.05em">交通手段</label>
          <div class="transport-row">
            <button class="transport-btn ${(data.transport||'車')==='車'?'active':''}" onclick="setTransport('${key}','車')">🚗 車</button>
            <button class="transport-btn ${data.transport==='徒歩'?'active':''}" onclick="setTransport('${key}','徒歩')">🚶 徒歩</button>
          </div>
        </div>
        <button class="clear-btn" onclick="clearDay('${key}')">✕ クリア</button>
      </div>
    </div>`;
  }

  document.getElementById('dayList').innerHTML = html;
}

function toggleCard(key) {
  const card = document.getElementById('card-' + key);
  card.classList.toggle('open');
}

function saveData() {
  try {
    localStorage.setItem('atelier_dayData', JSON.stringify(dayData));
    localStorage.setItem('atelier_year', currentYear);
    localStorage.setItem('atelier_month', currentMonth);
    showSaveToast();
  } catch(e) {}
}

function loadData() {
  try {
    const saved = localStorage.getItem('atelier_dayData');
    if (saved) dayData = JSON.parse(saved);
    const y = localStorage.getItem('atelier_year');
    const m = localStorage.getItem('atelier_month');
    if (y) currentYear = parseInt(y);
    if (m) currentMonth = parseInt(m);
  } catch(e) {}
}

function showSaveToast() {
  let toast = document.getElementById('saveToast');
  if (!toast) return;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 1500);
}

function setTime(key, field, val) {
  if (!dayData[key]) dayData[key] = { transport: '車' };
  dayData[key][field] = val;
  saveData();
  refreshCard(key);
}

function setTransport(key, val) {
  if (!dayData[key]) dayData[key] = {};
  dayData[key].transport = val;
  saveData();
  refreshCard(key);
}

function clearDay(key) {
  delete dayData[key];
  saveData();
  refreshCard(key);
}

function refreshCard(key) {
  render();
  const card = document.getElementById('card-' + key);
  if (card) card.classList.add('open');
}

function calculate() {
  const hourly = parseFloat(document.getElementById('hourly').value) || 1200;
  const limitMin = parseHHMM(document.getElementById('limitInput').value || '5.50');
  const carFare = parseInt(document.getElementById('carFare').value) || 200;
  const walkFare = parseInt(document.getElementById('walkFare').value) || 100;

  // Collect working days
  const days = daysInMonth(currentYear, currentMonth);
  let workDays = [];

  for (let d = 1; d <= days; d++) {
    const key = dateKey(currentYear, currentMonth, d);
    const data = dayData[key];
    if (!data || !data.start || !data.end) continue;
    const worked = timeDiff(data.start, data.end);
    if (worked <= 0) continue;
    const wd = getWeekday(currentYear, currentMonth, d);
    const hol = isHoliday(currentYear, currentMonth, d);
    workDays.push({ key, d, wd, hol, worked, transport: data.transport || '車' });
  }

  if (workDays.length === 0) {
    document.getElementById('resultArea').innerHTML = `<div class="no-result">出勤日が入力されていません</div>`;
    return;
  }

  // Cap & collect overflow
  let totalOverflow = 0;
  workDays.forEach(w => {
    if (w.worked > limitMin) {
      w.overflow = w.worked - limitMin;
      w.capped = limitMin;
      totalOverflow += w.overflow;
    } else {
      w.overflow = 0;
      w.capped = w.worked;
    }
  });

  // Distribute overflow: 1) existing weekdays (火水木金, non-holiday)
  const transferLog = [];
  let remaining = totalOverflow;

  const eligibleExisting = workDays.filter(w =>
    !w.hol && [2,3,4,5].includes(w.wd) // Tue-Fri (0=Sun,1=Mon,...6=Sat)
  );

  for (const w of eligibleExisting) {
    if (remaining <= 0) break;
    const space = limitMin - w.capped;
    if (space > 0) {
      const add = Math.min(space, remaining);
      w.capped += add;
      remaining -= add;
      transferLog.push({ date: `${currentMonth}/${String(w.d).padStart(2,'0')}`, type: '既存+', mins: add });
    }
  }

  // 2) new non-working weekdays (火水木金, non-holiday)
  const newTransferDays = [];
  if (remaining > 0) {
    for (let d = 1; d <= days && remaining > 0; d++) {
      const key = dateKey(currentYear, currentMonth, d);
      const wd = getWeekday(currentYear, currentMonth, d);
      const hol = isHoliday(currentYear, currentMonth, d);
      if (hol) continue;
      if (![2,3,4,5].includes(wd)) continue;
      if (workDays.find(w => w.d === d)) continue;
      const add = Math.min(limitMin, remaining);
      newTransferDays.push({ key, d, wd, hol: false, capped: add, transport: '徒歩', isTransfer: true });
      transferLog.push({ date: `${currentMonth}/${String(d).padStart(2,'0')}`, type: '振替', mins: add });
      remaining -= add;
    }
  }

  // All days
  const allDays = [...workDays, ...newTransferDays];
  allDays.sort((a, b) => a.d - b.d);

  // Totals
  let totalMins = 0;
  let totalTransport = 0;

  allDays.forEach(w => {
    totalMins += w.capped;
    if (w.isTransfer) {
      totalTransport += walkFare;
    } else {
      totalTransport += w.transport === '車' ? carFare : walkFare;
    }
  });

  const decimalHours = minutesToDecimal(totalMins);
  const baseSalary = decimalHours * hourly;
  const total = baseSalary + totalTransport;

  // Build result HTML
  let transferHTML = '';
  if (transferLog.length > 0) {
    const rows = transferLog.map(t =>
      `<div class="transfer-row">
        <span class="td">${t.type === '振替' ? '📅 ' : '➕ '}${t.date}</span>
        <span class="tt">+${minutesToHHMM(t.mins)}</span>
      </div>`
    ).join('');
    transferHTML = `
    <div class="transfer-info">
      <div class="transfer-info-title">▸ 振替処理</div>
      ${rows}
    </div>`;
  }

  const dayRows = allDays.map(w => {
    const fare = w.isTransfer ? walkFare : (w.transport === '車' ? carFare : walkFare);
    const tag = w.isTransfer ? '<span class="transfer-badge">振替</span>' : '';
    return `<div class="result-row">
      <span class="label">${currentMonth}/${String(w.d).padStart(2,'0')}（${WD[w.wd]}）${tag}</span>
      <span class="val">${minutesToHHMM(w.capped)}｜¥${fare}</span>
    </div>`;
  }).join('');

  document.getElementById('resultArea').innerHTML = `
  <div class="result-panel">
    <div class="result-title">📊 計算結果 — ${currentYear}年${currentMonth}月</div>
    <div class="result-rows">
      ${dayRows}
    </div>
    ${transferHTML}
    <hr class="result-divider">
    <div class="result-rows">
      <div class="result-row">
        <span class="label">合計時間</span>
        <span class="val">${minutesToHHMM(totalMins)}（${decimalHours.toFixed(4)}h）</span>
      </div>
      <div class="result-row">
        <span class="label">基本給</span>
        <span class="val">${decimalHours.toFixed(4)} × ¥${hourly} = ¥${Math.round(baseSalary).toLocaleString()}</span>
      </div>
      <div class="result-row">
        <span class="label">交通費合計</span>
        <span class="val">¥${totalTransport.toLocaleString()}</span>
      </div>
    </div>
    <hr class="result-divider">
    <div class="result-total">
      <span class="label">最終支給総額</span>
      <span class="amount">¥${Math.round(total).toLocaleString()}</span>
    </div>
    <button class="copy-btn" onclick="copyResult()">📋 LINEに貼り付け用コピー</button>
  </div>`;

  // Store plain text for copy
  window._resultText = [
    `【${currentYear}年${currentMonth}月 給与明細】`,
    ``,
    ...allDays.map(w => {
      const fare = w.isTransfer ? walkFare : (w.transport === '車' ? carFare : walkFare);
      const tag = w.isTransfer ? '［振替］' : '';
      return `${currentMonth}/${String(w.d).padStart(2,'0')}（${WD[w.wd]}）${tag} ${minutesToHHMM(w.capped)}  交通費¥${fare}`;
    }),
    ``,
    ...(transferLog.length > 0 ? [
      `【振替処理】`,
      ...transferLog.map(t => `${t.date}：+${minutesToHHMM(t.mins)}`),
      ``
    ] : []),
    `合計時間：${minutesToHHMM(totalMins)}（${decimalHours.toFixed(4)}h）`,
    `基本給：¥${Math.round(baseSalary).toLocaleString()}`,
    `交通費：¥${totalTransport.toLocaleString()}`,
    `━━━━━━━━━━━━`,
    `支給総額：¥${Math.round(total).toLocaleString()}`,
  ].join('\n');
}

function copyResult() {
  if (!window._resultText) return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(window._resultText).then(() => {
      showCopyToast();
    }).catch(() => fallbackCopy());
  } else {
    fallbackCopy();
  }
}

function fallbackCopy() {
  const ta = document.createElement('textarea');
  ta.value = window._resultText;
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showCopyToast();
}

function showCopyToast() {
  let toast = document.getElementById('saveToast');
  if (!toast) return;
  toast.textContent = '📋 コピーしました！LINEに貼り付けてください';
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => { toast.textContent = '💾 自動保存しました'; }, 400);
  }, 2500);
}

// Init handled at bottom after loadData()
// Time picker state
let pickerKey = null;
let pickerField = null;
let pickerH = 9;
let pickerM = 0;
let pressTimer = null;
let pressInterval = null;

function openPicker(key, field) {
  pickerKey = key;
  pickerField = field;
  const existing = (dayData[key] || {})[field] || '';
  if (existing) {
    const [h, m] = existing.split(':').map(Number);
    pickerH = h; pickerM = m;
  } else {
    pickerH = field === 'start' ? 9 : 17;
    pickerM = 0;
  }
  document.getElementById('pickerTitle').textContent = field === 'start' ? '開始時間を入力' : '終了時間を入力';
  document.getElementById('timePicker').classList.add('open');
  updatePickerDisplay();
}

function closePicker() {
  clearLongPress();
  document.getElementById('timePicker').classList.remove('open');
}

function adjustTime(part, delta) {
  if (part === 'h') {
    pickerH = (pickerH + delta + 24) % 24;
  } else {
    pickerM = (pickerM + delta + 60) % 60;
  }
  updatePickerDisplay();
}

function updatePickerDisplay() {
  const hStr = String(pickerH).padStart(2,'0');
  const mStr = String(pickerM).padStart(2,'0');
  document.getElementById('drumH').textContent = hStr;
  document.getElementById('drumM').textContent = mStr;
  document.getElementById('pickerDisplay').textContent = hStr + ':' + mStr;
}

function confirmPicker() {
  const val = String(pickerH).padStart(2,'0') + ':' + String(pickerM).padStart(2,'0');
  closePicker();
  setTime(pickerKey, pickerField, val);
}

// Long-press support for drum arrows
function startLongPress(part, delta) {
  adjustTime(part, delta);
  pressTimer = setTimeout(() => {
    pressInterval = setInterval(() => adjustTime(part, delta), 80);
  }, 400);
}
function clearLongPress() {
  clearTimeout(pressTimer);
  clearInterval(pressInterval);
  pressTimer = null; pressInterval = null;
}

// Attach long-press to drum arrows after DOM ready
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.drum-arrow').forEach(btn => {
    btn.addEventListener('mousedown', () => {});
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); btn.click(); }, { passive: false });
  });
});

// Close on overlay tap
document.getElementById('timePicker').addEventListener('click', function(e) {
  if (e.target === this) closePicker();
});

// Init: load saved data then render
loadData();
render();
</script>

  position: fixed;

  transform: translateX(-50%) translateY(20px);

  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  padding: 10px 20px;
  border-radius: 30px;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;

}

  transform: translateX(-50%) translateY(0);
